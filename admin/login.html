<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macasa APP - Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { background: #fff; border-radius: 16px; box-shadow: 0 25px 50px rgba(0,0,0,0.25); padding: 48px 40px; width: 100%; max-width: 420px; }
        .login-logo { text-align: center; margin-bottom: 32px; }
        .login-logo h1 { font-size: 28px; color: #0f172a; font-weight: 700; }
        .login-logo span { color: #d69e2e; }
        .login-logo p { color: #64748b; font-size: 14px; margin-top: 4px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; color: #334155; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; font-family: 'Inter', sans-serif; transition: border-color 0.2s; outline: none; }
        .form-group input:focus { border-color: #1e3a5f; box-shadow: 0 0 0 3px rgba(30,58,95,0.1); }
        .btn-login { width: 100%; padding: 14px; background: #1e3a5f; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s; }
        .btn-login:hover { background: #162d4a; }
        .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <h1>Maca<span>sa</span> APP</h1>
            <p>Panel de Administración</p>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>
    </div>
    <script>
    (function() {
        if (sessionStorage.getItem('macasa_admin')) { window.location.href = 'index.html'; return; }

        const DEFAULT_USER = { usuario: 'admin', password: 'admin123' };

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const u = document.getElementById('usuario').value.trim();
            const p = document.getElementById('password').value;
            if (u === DEFAULT_USER.usuario && p === DEFAULT_USER.password) {
                sessionStorage.setItem('macasa_admin', 'true');
                window.location.href = 'index.html';
            } else {
                const err = document.getElementById('errorMsg');
                err.textContent = 'Credenciales incorrectas';
                err.style.display = 'block';
            }
        });
    })();
    </script>
</body>
</html>
