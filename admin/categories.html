<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorías - Macasa APP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><h2>Maca<span>sa</span></h2><button class="sidebar-close" id="sidebarClose">&times;</button></div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
                <a href="products.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>Productos</a>
                <a href="categories.html" class="nav-link active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Categorías</a>
            </nav>
            <div class="sidebar-footer">
                <a href="../index.html" class="nav-link" target="_blank"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Ver Tienda</a>
                <a href="#" class="nav-link" id="logoutBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar Sesión</a>
            </div>
        </aside>
        <main class="admin-main">
            <header class="admin-topbar">
                <button class="sidebar-toggle" id="sidebarToggle"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
                <div class="topbar-right"><span class="user-name">Administrador</span></div>
            </header>
            <div class="admin-content">
                <div class="page-header">
                    <div><h1>Categorías</h1><p class="page-subtitle">Gestiona las categorías de tu catálogo</p></div>
                    <button class="btn btn-primary" id="btnNew">+ Nueva Categoría</button>
                </div>
                <div class="card">
                    <div class="table-responsive">
                        <table class="table">
                            <thead><tr><th>Orden</th><th>Nombre</th><th>Descripción</th><th>Productos</th><th>Estado</th><th>Acciones</th></tr></thead>
                            <tbody id="catsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div class="modal-overlay" id="catModal">
        <div class="modal">
            <div class="modal-header"><h2 id="modalTitle">Nueva Categoría</h2><button class="modal-close" id="modalClose">&times;</button></div>
            <form id="catForm">
                <input type="hidden" id="c_id" value="">
                <div class="form-group"><label>Nombre *</label><input type="text" id="c_nombre" required></div>
                <div class="form-group"><label>Descripción</label><textarea id="c_descripcion" rows="3"></textarea></div>
                <div class="form-group"><label>Orden</label><input type="number" id="c_orden" min="0" value="0"></div>
                <div class="form-group"><label class="checkbox-label"><input type="checkbox" id="c_activo" checked> Activa</label></div>
                <div class="modal-footer"><button type="button" class="btn" id="modalCancel">Cancelar</button><button type="submit" class="btn btn-primary">Guardar</button></div>
            </form>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script src="../js/admin.js"></script>
    <script>
    if (!sessionStorage.getItem('macasa_admin')) { window.location.href = 'login.html'; }
    document.getElementById('logoutBtn').addEventListener('click', function(e) { e.preventDefault(); sessionStorage.removeItem('macasa_admin'); window.location.href = 'login.html'; });

    function getData() { return JSON.parse(localStorage.getItem('macasa_data') || '{"categorias":[],"productos":[]}'); }
    function saveData(d) { localStorage.setItem('macasa_data', JSON.stringify(d)); }

    function renderCategories() {
        const data = getData();
        const tbody = document.getElementById('catsTable');
        tbody.innerHTML = '';
        data.categorias.forEach(c => {
            const count = data.productos.filter(p => p.categoria_id == c.id).length;
            tbody.innerHTML += `<tr>
                <td>${c.orden || 0}</td><td><strong>${c.nombre}</strong></td><td>${c.descripcion || ''}</td>
                <td>${count}</td>
                <td><span class="badge ${c.activo ? 'badge-green' : 'badge-red'}">${c.activo ? 'Activa' : 'Inactiva'}</span></td>
                <td class="actions">
                    <button class="btn-icon" onclick='editCat(${JSON.stringify(c).replace(/'/g,"&#39;")})' title="Editar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                    <button class="btn-icon btn-danger" onclick="deleteCat(${c.id})" title="Eliminar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
                </td></tr>`;
        });
    }

    window.editCat = function(c) {
        document.getElementById('modalTitle').textContent = 'Editar Categoría';
        document.getElementById('c_id').value = c.id;
        document.getElementById('c_nombre').value = c.nombre;
        document.getElementById('c_descripcion').value = c.descripcion || '';
        document.getElementById('c_orden').value = c.orden || 0;
        document.getElementById('c_activo').checked = c.activo == 1;
        document.getElementById('catModal').classList.add('open');
    };

    window.deleteCat = function(id) {
        const data = getData();
        const count = data.productos.filter(p => p.categoria_id == id).length;
        if (!confirm(`¿Eliminar esta categoría? ${count} producto(s) asociado(s) también se eliminarán.`)) return;
        data.categorias = data.categorias.filter(c => c.id != id);
        data.productos = data.productos.filter(p => p.categoria_id != id);
        saveData(data); renderCategories(); showToast('Categoría eliminada');
    };

    document.getElementById('btnNew').addEventListener('click', function() {
        document.getElementById('modalTitle').textContent = 'Nueva Categoría';
        document.getElementById('catForm').reset();
        document.getElementById('c_id').value = '';
        document.getElementById('c_activo').checked = true;
        document.getElementById('catModal').classList.add('open');
    });

    document.getElementById('modalClose').addEventListener('click', () => document.getElementById('catModal').classList.remove('open'));
    document.getElementById('modalCancel').addEventListener('click', () => document.getElementById('catModal').classList.remove('open'));
    document.getElementById('catModal').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); });

    document.getElementById('catForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const data = getData();
        const id = document.getElementById('c_id').value;
        const cat = {
            id: id ? parseInt(id) : Date.now(),
            nombre: document.getElementById('c_nombre').value.trim(),
            descripcion: document.getElementById('c_descripcion').value.trim(),
            orden: parseInt(document.getElementById('c_orden').value) || 0,
            activo: document.getElementById('c_activo').checked ? 1 : 0
        };
        if (id) {
            const idx = data.categorias.findIndex(c => c.id == id);
            if (idx >= 0) data.categorias[idx] = cat;
        } else {
            data.categorias.push(cat);
        }
        saveData(data);
        document.getElementById('catModal').classList.remove('open');
        renderCategories();
        showToast('Categoría guardada');
    });

    renderCategories();
    </script>
</body>
</html>
