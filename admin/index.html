<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Macasa APP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Maca<span>sa</span></h2>
                <button class="sidebar-close" id="sidebarClose">&times;</button>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    Dashboard
                </a>
                <a href="products.html" class="nav-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
                    Productos
                </a>
                <a href="categories.html" class="nav-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                    Categorías
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="../index.html" class="nav-link" target="_blank">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    Ver Tienda
                </a>
                <a href="#" class="nav-link" id="logoutBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Cerrar Sesión
                </a>
            </div>
        </aside>
        <main class="admin-main">
            <header class="admin-topbar">
                <button class="sidebar-toggle" id="sidebarToggle">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="topbar-right"><span class="user-name">Administrador</span></div>
            </header>
            <div class="admin-content">
                <div class="page-header">
                    <div>
                        <h1>Dashboard</h1>
                        <p class="page-subtitle">Resumen de tu tienda</p>
                    </div>
                </div>
                <div class="stats-grid" id="statsGrid"></div>
                <div class="card">
                    <div class="card-header">
                        <h2>Últimos Productos</h2>
                        <a href="products.html" class="btn btn-sm">Ver todos</a>
                    </div>
                    <div class="table-responsive">
                        <table class="table">
                            <thead><tr><th>Producto</th><th>Categoría</th><th>Precio</th><th>Stock</th><th>Estado</th></tr></thead>
                            <tbody id="recentProducts"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/admin.js"></script>
    <script>
    if (!sessionStorage.getItem('macasa_admin')) { window.location.href = 'login.html'; }
    document.getElementById('logoutBtn').addEventListener('click', function(e) { e.preventDefault(); sessionStorage.removeItem('macasa_admin'); window.location.href = 'login.html'; });

    const data = JSON.parse(localStorage.getItem('macasa_data') || '{}');
    const products = data.productos || [];
    const categories = data.categorias || [];
    const activos = products.filter(p => p.activo);
    const stockBajo = activos.filter(p => p.stock < 5).length;

    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-icon stat-icon-blue"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg></div><div class="stat-info"><span class="stat-number">${products.length}</span><span class="stat-label">Productos</span></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-gold"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg></div><div class="stat-info"><span class="stat-number">${categories.length}</span><span class="stat-label">Categorías</span></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-green"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div><div class="stat-info"><span class="stat-number">${activos.length}</span><span class="stat-label">Activos</span></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-red"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg></div><div class="stat-info"><span class="stat-number">${stockBajo}</span><span class="stat-label">Stock Bajo</span></div></div>
    `;

    const recent = [...products].sort((a, b) => b.id - a.id).slice(0, 5);
    const tbody = document.getElementById('recentProducts');
    recent.forEach(p => {
        const cat = categories.find(c => c.id == p.categoria_id);
        tbody.innerHTML += `<tr><td><strong>${p.nombre}</strong></td><td>${cat ? cat.nombre : ''}</td><td>$${p.precio.toLocaleString('en-US', {minimumFractionDigits:2})}</td><td>${p.stock}</td><td><span class="badge ${p.activo ? 'badge-green' : 'badge-red'}">${p.activo ? 'Activo' : 'Inactivo'}</span></td></tr>`;
    });
    </script>
</body>
</html>
