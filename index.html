<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macasa APP - Catálogo de Productos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <div class="container header-inner">
            <div class="logo">
                <h1>Maca<span>sa</span></h1>
                <span class="logo-sub">APP</span>
            </div>
            <div class="header-search">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="searchInput" placeholder="Buscar productos...">
            </div>
            <button class="cart-toggle" id="cartToggle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                <span class="cart-badge" id="cartBadge">0</span>
            </button>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h2>Encuentra lo que necesitas</h2>
            <p>Explora nuestro catálogo completo de productos con los mejores precios</p>
        </div>
    </section>

    <section class="catalog">
        <div class="container">
            <div class="category-filters" id="categoryFilters">
                <button class="filter-btn active" data-category="0">Todos</button>
            </div>

            <div class="products-grid" id="productsGrid"></div>
            <p class="no-results" id="noResults" style="display:none">No se encontraron productos</p>

            <div class="pagination" id="pagination"></div>
        </div>
    </section>

    <div class="cart-overlay" id="cartOverlay"></div>
    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>Mi Carrito</h2>
            <button class="cart-close" id="cartClose">&times;</button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="cart-empty" id="cartEmpty">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                <p>Tu carrito está vacío</p>
            </div>
        </div>
        <div class="cart-footer" id="cartFooter" style="display:none">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <div class="cart-form">
                <input type="text" id="clientName" placeholder="Tu nombre *" required>
                <input type="tel" id="clientPhone" placeholder="Tu teléfono *" required>
            </div>
            <button class="btn-solicitar" id="btnSolicitar">Solicitar</button>
        </div>
    </aside>

    <div class="toast" id="toast"></div>

    <div class="lightbox-overlay" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <div class="lightbox-content">
            <img src="" alt="" id="lightboxImg">
        </div>
        <p class="lightbox-name" id="lightboxName"></p>
        <p class="lightbox-price" id="lightboxPrice"></p>
    </div>

    <script src="js/app.js"></script>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Macasa APP. Todos los derechos reservados.</p>
        </div>
    </footer>
</body>
</html>
